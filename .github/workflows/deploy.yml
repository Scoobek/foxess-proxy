# .github/workflows/deploy.yml
on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: self-hosted
        steps:
            - name: Pull latest code
              run: |
                  cd /projects/foxess-proxy
                  git pull origin main

            - name: Install dependencies
              run: |
                  cd /projects/foxess-proxy
                  npm ci

            - name: Restart service
              run: sudo systemctl restart actions.runner.Scoobek-foxess-proxy.homeserver.service
