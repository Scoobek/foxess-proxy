# .github/workflows/deploy.yml
on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: self-hosted
        steps:
            - name: Pull latest code
              run: |
                  cd /home/scoobek/projects/foxess-proxy
                  git pull origin main

            - name: Install dependencies
              run: |
                  cd /home/scoobek/projects/foxess-proxy
                  npm ci

            - name: Build
              run: |
                  cd /home/scoobek/projects/foxess-proxy
                  npm run build

            - name: Restart service
              run: sudo systemctl restart foxess-proxy
