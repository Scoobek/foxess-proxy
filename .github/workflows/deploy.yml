# .github/workflows/deploy.yml
name: Build & Deploy foxess-proxy

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: self-hosted
        steps:
            - name: Pull latest code
              run: git -C /home/scoobek/projects/foxess-proxy pull origin main

            - name: Install dependencies
              run: npm ci --prefix /home/scoobek/projects/foxess-proxy

            - name: Build
              run: npm run build --prefix /home/scoobek/projects/foxess-proxy

            - name: Restart service
              run: sudo systemctl restart foxess-proxy
